<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COOL.FI — eventi a Firenze</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://images.unsplash.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#F4F1EA;
  --bg2:#FFFFFF;
  --bg3:#FAF7F0;
  --text:#16140F;
  --muted:#75716A;
  --accent:#C8FF00;
  --accent-deep:#A6D900;
  --border:rgba(22,20,15,0.08);
  --border-hover:rgba(22,20,15,0.18);
  --shadow:0 1px 2px rgba(22,20,15,0.04), 0 8px 24px rgba(22,20,15,0.05);
  --shadow-hover:0 2px 6px rgba(22,20,15,0.08), 0 18px 50px rgba(22,20,15,0.1);
}

html,body{height:100%;background:var(--bg);color:var(--text);overflow:hidden}
body{font-family:'DM Sans',-apple-system,'Helvetica Neue',sans-serif;font-size:15px;-webkit-font-smoothing:antialiased}

/* ─── APP LAYOUT ─── */
.app{
  height:100vh;height:100dvh;
  display:grid;
  grid-template-rows:auto 1fr;
}

/* ─── HEADER ─── */
.hd{
  padding:1rem 1.5rem;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
  background:var(--bg);
  z-index:10;
}
.logo{
  font-family:'Syne','Helvetica Neue',sans-serif;
  font-weight:800;font-size:20px;letter-spacing:-0.03em;line-height:1;
  display:flex;align-items:center;gap:2px;
}
.logo-dot{color:var(--accent-deep);font-size:26px;line-height:0.7}
.hd-mid{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex:0 1 auto}
.hd-mid::-webkit-scrollbar{display:none}
.fb{
  background:var(--bg2);border:1px solid var(--border);
  color:var(--muted);font-family:inherit;font-size:11px;font-weight:500;
  padding:6px 13px;border-radius:100px;cursor:pointer;
  white-space:nowrap;transition:all 0.15s;
  text-transform:uppercase;letter-spacing:0.06em;
}
.fb:hover{color:var(--text);border-color:var(--border-hover)}
.fb.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.hd-right{text-align:right;flex-shrink:0}
.hd-date{font-size:11px;color:var(--muted);text-transform:capitalize}
.hd-city{font-size:11px;color:var(--muted)}

/* ─── MAIN ─── */
.main{
  display:grid;
  grid-template-columns:240px 1fr;
  overflow:hidden;
  min-height:0;
}

/* ─── SIDEBAR GALLERY ─── */
.gallery{
  border-right:1px solid var(--border);
  overflow-y:auto;overflow-x:hidden;
  padding:1rem 0.875rem;
  scrollbar-width:thin;
  scrollbar-color:var(--border-hover) transparent;
}
.gallery::-webkit-scrollbar{width:6px}
.gallery::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:3px}
.gallery-title{
  font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--muted);margin:0 4px 10px;
  display:flex;justify-content:space-between;align-items:center;
}
.gallery-count{
  background:var(--text);color:var(--bg);
  padding:2px 8px;border-radius:100px;font-size:10px;
}
.thumbs{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.thumb{
  position:relative;
  aspect-ratio:3/4;
  border-radius:10px;overflow:hidden;
  cursor:pointer;
  background:#E8E4DA;
  border:2px solid transparent;
  transition:transform 0.15s, border-color 0.15s;
}
.thumb:hover{transform:translateY(-2px)}
.thumb.active{border-color:var(--accent-deep)}
.thumb img{
  width:100%;height:100%;object-fit:cover;display:block;
}
.thumb::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(0,0,0,0.55) 100%);
}
.thumb-lbl{
  position:absolute;left:6px;right:6px;bottom:5px;z-index:2;
  font-size:10px;font-weight:600;color:#fff;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  line-height:1.2;
  text-shadow:0 1px 4px rgba(0,0,0,0.6);
}
.thumb-cat{
  position:absolute;top:5px;left:5px;z-index:2;
  font-size:8px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
  background:rgba(255,255,255,0.92);color:#16140F;
  padding:2px 6px;border-radius:100px;backdrop-filter:blur(6px);
}

/* ─── REEL FEED ─── */
.feed{
  overflow-y:auto;overflow-x:hidden;
  scroll-snap-type:y mandatory;
  scroll-behavior:smooth;
  scrollbar-width:none;
  padding:1rem 0;
  display:flex;flex-direction:column;align-items:center;
  gap:1rem;
}
.feed::-webkit-scrollbar{display:none}

.reel{
  position:relative;
  scroll-snap-align:center;
  scroll-snap-stop:always;
  width:min(420px, 92vw);
  aspect-ratio:9/16;
  max-height:calc(100vh - 8rem);
  border-radius:22px;overflow:hidden;
  background:#1A1815;
  box-shadow:var(--shadow);
  flex-shrink:0;
  cursor:pointer;
  transition:transform 0.2s ease, box-shadow 0.2s ease;
}
.reel:hover{box-shadow:var(--shadow-hover)}

.reel-img{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
}
.reel-img img,
.reel-video{
  width:100%;height:100%;object-fit:cover;display:block;
}
.reel-video{
  position:absolute;inset:0;
  opacity:0;
  transform:scale(1.02);
  transition:opacity 0.45s ease, transform 2.4s ease;
}
.reel-video.ready{opacity:1;transform:scale(1)}
.reel-video-fallback{
  position:absolute;inset:0;
  width:100%;height:100%;object-fit:cover;display:block;
  filter:saturate(1.05);
}
.reel-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,
    rgba(0,0,0,0.35) 0%,
    rgba(0,0,0,0) 25%,
    rgba(0,0,0,0) 45%,
    rgba(0,0,0,0.55) 75%,
    rgba(0,0,0,0.85) 100%);
  pointer-events:none;
}

/* gradient fallback colors per category (shown if image fails) */
.reel-img.CONCERTO{background:linear-gradient(135deg,#5E1815,#D8453C)}
.reel-img.SERATA  {background:linear-gradient(135deg,#2A1A55,#7B4FFF)}
.reel-img.MOSTRA  {background:linear-gradient(135deg,#5E3A0A,#D88A1F)}
.reel-img.MERCATO {background:linear-gradient(135deg,#0F4520,#2DA552)}
.reel-img.SPORT   {background:linear-gradient(135deg,#0A2855,#0A6FE0)}
.reel-img.FOOD    {background:linear-gradient(135deg,#5E1F0A,#E0653A)}
.reel-img.CULTURA {background:linear-gradient(135deg,#3A0F4F,#A04AD3)}

.reel-top{
  position:absolute;top:14px;left:14px;right:14px;z-index:5;
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  pointer-events:none;
}
.reel-cat{
  font-size:10px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;
  background:rgba(255,255,255,0.95);color:#16140F;
  padding:5px 10px;border-radius:100px;
  backdrop-filter:blur(8px);
  flex:0 0 auto;
}
.reel-cat.CONCERTO{color:#D8453C}
.reel-cat.SERATA  {color:#7B4FFF}
.reel-cat.MOSTRA  {color:#D88A1F}
.reel-cat.MERCATO {color:#1B7A39}
.reel-cat.SPORT   {color:#0A6FE0}
.reel-cat.FOOD    {color:#E0653A}
.reel-cat.CULTURA {color:#A04AD3}
.reel-meta{
  display:flex;align-items:stretch;gap:0;
  color:#16140F;
  background:rgba(10,10,10,0.76);
  border:1px solid rgba(255,255,255,0.22);
  border-radius:13px;
  overflow:hidden;
  box-shadow:0 8px 24px rgba(0,0,0,0.24);
  backdrop-filter:blur(10px);
  isolation:isolate;
  flex:0 1 auto;
  max-width:66%;
}
.mini-cal{
  width:58px;min-height:60px;overflow:hidden;
  background:rgba(255,255,255,0.98);
  text-align:center;
  flex:0 0 58px;
}
.mini-cal-month{
  display:block;
  background:var(--accent);
  color:#16140F;
  font-size:8px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;
  padding:3px 2px 2px;
}
.mini-cal-day{
  display:block;
  font-family:'Syne','Helvetica Neue',sans-serif;
  font-size:21px;font-weight:800;line-height:1;
  padding-top:6px;
}
.mini-cal-weekday{
  display:block;
  font-size:8px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.06em;
  padding:2px 2px 5px;
}
.date-context{
  color:#fff;
  padding:9px 11px;
  display:flex;flex-direction:column;justify-content:center;gap:2px;
  min-width:0;
}
.date-rel{
  font-size:10px;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.date-time{
  font-size:11px;font-weight:600;color:rgba(255,255,255,0.82);
  white-space:nowrap;
}

.reel-info{
  position:absolute;bottom:0;left:0;right:0;z-index:3;
  padding:18px 18px 22px 18px;
  color:#fff;
  display:flex;flex-direction:column;gap:6px;
}
.reel-title{
  font-family:'Syne','Helvetica Neue',sans-serif;
  font-weight:700;font-size:22px;line-height:1.1;letter-spacing:-0.02em;
  text-shadow:0 2px 12px rgba(0,0,0,0.4);
}
.reel-loc{
  font-size:13px;color:rgba(255,255,255,0.92);
  display:flex;align-items:center;gap:5px;
  text-shadow:0 1px 6px rgba(0,0,0,0.5);
}
.reel-loc::before{content:'↗';font-size:11px;opacity:0.8}
.reel-desc{
  font-size:13px;line-height:1.45;color:rgba(255,255,255,0.85);
  margin-top:3px;
  text-shadow:0 1px 6px rgba(0,0,0,0.5);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.reel-vibes{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.vibe{
  font-size:10.5px;color:#fff;font-weight:500;
  background:rgba(255,255,255,0.18);
  border:1px solid rgba(255,255,255,0.25);
  backdrop-filter:blur(6px);
  padding:3px 9px;border-radius:100px;
}

.reel-source{
  position:absolute;top:90px;left:14px;z-index:4;
  color:#fff;text-decoration:none;
  display:inline-flex;align-items:center;gap:6px;
  max-width:calc(100% - 28px);
  padding:5px 9px;border-radius:100px;
  background:rgba(0,0,0,0.42);
  border:1px solid rgba(255,255,255,0.16);
  backdrop-filter:blur(8px);
  font-size:10px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;
}
.reel-source::before{
  content:'';
  width:6px;height:6px;border-radius:50%;
  background:#fff;
  opacity:0.85;
}
.reel-source span{
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.date-divider{
  scroll-snap-align:start;
  width:min(420px, 92vw);
  display:flex;align-items:center;gap:12px;
  color:var(--text);
  padding:8px 4px 0;
  flex-shrink:0;
}
.date-divider::after{
  content:'';
  height:1px;flex:1;
  background:var(--border-hover);
}
.date-divider-kicker{
  font-size:10px;font-weight:800;letter-spacing:0.11em;text-transform:uppercase;
  color:var(--muted);
}
.date-divider-title{
  display:block;
  font-family:'Syne','Helvetica Neue',sans-serif;
  font-size:20px;font-weight:800;letter-spacing:-0.02em;
  line-height:1;
}

/* ─── MODAL ─── */
.modal{
  position:fixed;inset:0;z-index:100;
  background:rgba(22,20,15,0.6);backdrop-filter:blur(12px);
  display:none;align-items:center;justify-content:center;
  padding:1.5rem;
  animation:fadeIn 0.2s ease;
}
.modal.show{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.modal-card{
  background:var(--bg2);
  border-radius:20px;
  width:100%;max-width:540px;
  max-height:90vh;overflow-y:auto;
  box-shadow:0 30px 80px rgba(0,0,0,0.4);
  scrollbar-width:thin;
  animation:slideUp 0.25s ease;
}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}

.modal-cover{
  position:relative;aspect-ratio:16/10;overflow:hidden;
  background:#E8E4DA;
}
.modal-cover img,
.modal-cover video{width:100%;height:100%;object-fit:cover;display:block}
.modal-cover video{background:#16140F}
.modal-cover-play{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg, rgba(0,0,0,0.1), rgba(0,0,0,0.35));
}
.modal-cover.has-video .modal-cover-play{
  align-items:flex-start;justify-content:flex-start;
  padding:12px;
  background:linear-gradient(180deg, rgba(0,0,0,0.42), rgba(0,0,0,0) 45%);
  pointer-events:none;
}
.modal-cover-play .pp{
  width:72px;height:72px;border-radius:50%;
  background:rgba(255,255,255,0.95);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;color:#16140F;
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
  cursor:pointer;
  transition:transform 0.15s;
}
.modal-cover-play .pp:hover{transform:scale(1.06)}
.modal-cover.has-video .modal-cover-play .pp{
  width:auto;height:auto;
  padding:6px 10px;
  font-size:10px;font-weight:800;letter-spacing:0.08em;
  color:#16140F;
  box-shadow:none;
}
.modal-close{
  position:absolute;top:12px;right:12px;z-index:2;
  width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);
  border:none;color:#fff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.modal-close:hover{background:rgba(0,0,0,0.75)}

.modal-body{padding:1.5rem 1.5rem 1.75rem}
.modal-cat-row{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
.modal-cat{
  font-size:10px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;
  padding:4px 10px;border-radius:100px;
}
.modal-cat.CONCERTO{background:rgba(216,69,60,0.12);color:#D8453C}
.modal-cat.SERATA  {background:rgba(123,79,255,0.12);color:#7B4FFF}
.modal-cat.MOSTRA  {background:rgba(216,138,31,0.12);color:#D88A1F}
.modal-cat.MERCATO {background:rgba(45,165,82,0.12);color:#1B7A39}
.modal-cat.SPORT   {background:rgba(10,111,224,0.12);color:#0A6FE0}
.modal-cat.FOOD    {background:rgba(224,101,58,0.12);color:#E0653A}
.modal-cat.CULTURA {background:rgba(160,74,211,0.12);color:#A04AD3}
.modal-meta{font-size:12px;color:var(--muted);font-weight:500}
.modal-title{
  font-family:'Syne','Helvetica Neue',sans-serif;
  font-weight:700;font-size:26px;letter-spacing:-0.02em;line-height:1.1;
  margin-bottom:6px;
}
.modal-loc{
  font-size:14px;color:var(--muted);
  display:flex;align-items:center;gap:5px;margin-bottom:14px;
}
.modal-loc::before{content:'↗';font-size:11px;opacity:0.6}
.modal-desc{
  font-size:14.5px;line-height:1.55;
  color:rgba(22,20,15,0.78);margin-bottom:14px;
}
.modal-source{
  display:inline-flex;align-items:center;gap:7px;
  color:var(--text);text-decoration:none;
  background:var(--bg);border:1px solid var(--border);
  padding:7px 10px;border-radius:100px;
  font-size:12px;font-weight:700;
  margin:2px 0 14px;
}
.modal-source::before{
  content:'';width:7px;height:7px;border-radius:50%;background:var(--accent-deep);
}
.modal-vibes{display:flex;flex-wrap:wrap;gap:6px}
.modal-vibes .vibe{
  background:var(--bg);color:var(--muted);
  border:1px solid var(--border);
  text-shadow:none;
  font-size:11.5px;
}

.modal-actions{
  display:flex;gap:8px;margin-top:18px;
}
.btn{
  flex:1;padding:11px 14px;border-radius:12px;
  font-family:inherit;font-size:13px;font-weight:600;
  border:1px solid var(--border);background:var(--bg2);color:var(--text);
  cursor:pointer;transition:all 0.15s;
}
.btn:hover{border-color:var(--border-hover)}
.btn-primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn-primary:hover{background:#000}

/* ─── EMPTY ─── */
.empty{
  padding:4rem 1.5rem;text-align:center;
  color:var(--muted);font-size:14px;line-height:1.7;
  width:100%;
}

/* ─── RESPONSIVE ─── */
@media (max-width:760px){
  .main{grid-template-columns:1fr}
  .gallery{display:none}
  .hd-mid{display:none}
  .reel{max-height:calc(100vh - 6rem);width:min(420px,96vw)}
}
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header class="hd">
    <div class="logo">COOL<span class="logo-dot">.</span>FI</div>
    <div class="hd-mid" id="filters">
      <button class="fb active" data-cat="TUTTI">Tutti</button>
      <button class="fb" data-cat="CONCERTO">Concerti</button>
      <button class="fb" data-cat="SERATA">Serate</button>
      <button class="fb" data-cat="MOSTRA">Mostre</button>
      <button class="fb" data-cat="MERCATO">Mercati</button>
      <button class="fb" data-cat="SPORT">Sport</button>
      <button class="fb" data-cat="FOOD">Food</button>
      <button class="fb" data-cat="CULTURA">Cultura</button>
    </div>
    <div class="hd-right">
      <div class="hd-date" id="hd-date"></div>
      <div class="hd-city">Firenze</div>
    </div>
  </header>

  <!-- Main: gallery + reel feed -->
  <div class="main">
    <aside class="gallery" id="gallery">
      <div class="gallery-title">
        <span>Tutti gli eventi</span>
        <span class="gallery-count" id="g-count">0</span>
      </div>
      <div class="thumbs" id="thumbs"></div>
    </aside>

    <section class="feed" id="feed"></section>
  </div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-card" id="modal-card"></div>
</div>

<script>
// ── Date ──
const now = new Date();
document.getElementById('hd-date').textContent = now.toLocaleDateString('it-IT',{
  weekday:'long', day:'numeric', month:'long'
});

// ── Real events (curated, Firenze · 29 apr → 3 mag 2026) ──
const U = (id, w=900, h=1600) => `https://images.unsplash.com/photo-${id}?auto=format&fit=crop&w=${w}&h=${h}&q=80`;

const officialSocials = {
  maggio: {
    platform: 'Instagram',
    label: '@teatrodelmaggio',
    url: 'https://www.instagram.com/teatrodelmaggio/'
  },
  strozzi: {
    platform: 'Instagram',
    label: '@palazzostrozzi',
    url: 'https://www.instagram.com/palazzostrozzi'
  },
  mida: {
    platform: 'Instagram',
    label: '@mostrartigianato',
    url: 'https://www.instagram.com/mostrartigianato'
  }
};

const socialFor = ev => ev.social || officialSocials[ev.socialKey] || null;
const videoFor = ev => ev.socialVideo || ev.video || '';
const sourceFor = ev => {
  const social = socialFor(ev);
  if (!social) return null;
  return {
    ...social,
    tag: ev.socialVideo ? `video da ${social.label}` : social.label
  };
};
const scheduleToday = new Date(2026, 3, 29);
const monthLabels = ['gen', 'feb', 'mar', 'apr', 'mag', 'giu', 'lug', 'ago', 'set', 'ott', 'nov', 'dic'];
const weekdayLabels = ['dom', 'lun', 'mar', 'mer', 'gio', 'ven', 'sab'];

function parseEventDate(ev) {
  const raw = (ev.data || '').toLowerCase();
  const match = raw.match(/(\d{1,2})\/(\d{1,2})/);
  const ongoing = raw.includes('fino') || raw.includes('in corso');
  const date = match
    ? new Date(2026, Number(match[2]) - 1, Number(match[1]))
    : new Date(scheduleToday);
  const dayDiff = Math.round((date - scheduleToday) / 86400000);
  const weekend = date.getDay() === 0 || date.getDay() === 6;
  let relative = `${weekdayLabels[date.getDay()]} ${date.getDate()} ${monthLabels[date.getMonth()]}`;
  if (ongoing) relative = raw.includes('fino') ? `fino al ${date.getDate()} ${monthLabels[date.getMonth()]}` : 'in corso';
  if (!ongoing && dayDiff === 0) relative = 'oggi';
  if (!ongoing && dayDiff === 1) relative = 'domani';
  if (!ongoing && dayDiff > 1 && weekend) relative = 'weekend';

  let groupLabel = `${weekdayLabels[date.getDay()]} ${date.getDate()} ${monthLabels[date.getMonth()]}`;
  let groupKicker = 'prossimi';
  let sort = date.getTime();
  if (ongoing) {
    groupLabel = 'In corso';
    groupKicker = 'aperti ora';
    sort = scheduleToday.getTime() - 1;
  } else if (dayDiff === 0) {
    groupLabel = 'Oggi';
    groupKicker = `${weekdayLabels[date.getDay()]} ${date.getDate()} ${monthLabels[date.getMonth()]}`;
  } else if (dayDiff === 1) {
    groupLabel = 'Domani';
    groupKicker = `${weekdayLabels[date.getDay()]} ${date.getDate()} ${monthLabels[date.getMonth()]}`;
  } else if (weekend) {
    groupKicker = 'weekend';
  }

  return {
    date,
    sort,
    ongoing,
    day: date.getDate(),
    month: monthLabels[date.getMonth()],
    weekday: weekdayLabels[date.getDay()],
    relative,
    groupLabel,
    groupKicker,
    groupKey: `${groupKicker}-${groupLabel}`
  };
}

function sortedEvents(events) {
  return [...events].sort((a, b) => {
    const da = parseEventDate(a);
    const db = parseEventDate(b);
    return da.sort - db.sort || (a.orario || '').localeCompare(b.orario || '');
  });
}

let activeFilter = 'TUTTI';
let filtered = allEvents;

const feedEl = document.getElementById('feed');
const thumbsEl = document.getElementById('thumbs');
const gCount = document.getElementById('g-count');
const modal = document.getElementById('modal');
const modalCard = document.getElementById('modal-card');

// ── Filter buttons ──
document.querySelectorAll('.fb').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.cat;
    document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

// ── Render ──
function render() {
  const visibleEvents = activeFilter === 'TUTTI'
    ? allEvents
    : allEvents.filter(e => (e.categoria || '').toUpperCase() === activeFilter);
  filtered = sortedEvents(visibleEvents);

  gCount.textContent = filtered.length;

  if (filtered.length === 0) {
    feedEl.innerHTML = `<div class="empty">Nessun evento per questa categoria.<br>Prova a cambiare filtro.</div>`;
    thumbsEl.innerHTML = '';
    return;
  }

  feedEl.innerHTML = feedHTML(filtered);
  thumbsEl.innerHTML = filtered.map((e, i) => thumbHTML(e, i)).join('');

  // wire reel clicks → modal
  feedEl.querySelectorAll('.reel').forEach((el) => {
    el.addEventListener('click', (ev) => {
      openModal(filtered[Number(el.dataset.idx)]);
    });
  });

  // wire thumb clicks → scroll feed
  thumbsEl.querySelectorAll('.thumb').forEach((el, i) => {
    el.addEventListener('click', () => {
      const target = feedEl.querySelectorAll('.reel')[i];
      if (target) target.scrollIntoView({ behavior:'smooth', block:'center' });
      setActiveThumb(i);
    });
  });

  // observe which reel is centered → highlight thumb
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(en => {
      if (en.isIntersecting && en.intersectionRatio > 0.6) {
        const idx = Number(en.target.dataset.idx);
        setActiveThumb(idx);
      }
      const video = en.target.querySelector('video');
      if (video) {
        if (en.isIntersecting && en.intersectionRatio > 0.55) {
          video.play().catch(() => {});
        } else {
          video.pause();
        }
      }
    });
  }, { root: feedEl, threshold:[0.6, 0.9] });

  feedEl.querySelectorAll('.reel').forEach(r => observer.observe(r));
  feedEl.querySelectorAll('.reel-video').forEach(video => {
    video.addEventListener('canplay', () => video.classList.add('ready'), { once:true });
    video.addEventListener('error', () => video.remove(), { once:true });
  });

  setActiveThumb(0);
}

function feedHTML(events) {
  let lastGroup = '';
  return events.map((e, i) => {
    const date = parseEventDate(e);
    const divider = date.groupKey !== lastGroup
      ? `<div class="date-divider">
          <div>
            <span class="date-divider-kicker">${date.groupKicker}</span>
            <span class="date-divider-title">${date.groupLabel}</span>
          </div>
        </div>`
      : '';
    lastGroup = date.groupKey;
    return divider + reelHTML(e, i, date);
  }).join('');
}

function setActiveThumb(idx) {
  thumbsEl.querySelectorAll('.thumb').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
    if (i === idx) t.scrollIntoView({ block:'nearest', behavior:'smooth' });
  });
}

function reelHTML(ev, i, date = parseEventDate(ev)) {
  const cat = (ev.categoria || 'CULTURA').toUpperCase();
  const loc = [ev.luogo, ev.quartiere].filter(Boolean).join(' · ');
  const vibes = (ev.vibe || []).slice(0,3).map(v => `<span class="vibe">#${v}</span>`).join('');
  const imgUrl = ev.img ? U(ev.img, 900, 1600) : '';
  const videoUrl = videoFor(ev);
  const source = sourceFor(ev);
  return `
    <article class="reel ${videoUrl ? 'has-video' : ''}" data-idx="${i}">
      <div class="reel-img ${cat}">
        ${imgUrl ? `<img class="reel-video-fallback" src="${imgUrl}" alt="" loading="lazy" onerror="this.remove()">` : ''}
        ${videoUrl ? `<video class="reel-video" src="${videoUrl}" poster="${imgUrl}" autoplay muted loop playsinline preload="metadata"></video>` : ''}
      </div>
      <div class="reel-overlay"></div>

      <div class="reel-top">
        <span class="reel-cat ${cat}">${cat}</span>
        <span class="reel-meta">
          <span class="mini-cal" aria-label="${date.relative}">
            <span class="mini-cal-month">${date.month}</span>
            <span class="mini-cal-day">${date.day}</span>
            <span class="mini-cal-weekday">${date.weekday}</span>
          </span>
          <span class="date-context">
            <span class="date-rel">${date.relative}</span>
            ${ev.orario ? `<span class="date-time">${ev.orario}</span>` : ''}
          </span>
        </span>
      </div>
      ${source ? `<a class="reel-source" href="${source.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><span>${source.tag}</span></a>` : ''}

      <div class="reel-info">
        <div class="reel-title">${ev.titolo || 'Evento'}</div>
        ${loc ? `<div class="reel-loc">${loc}</div>` : ''}
        ${ev.descrizione ? `<div class="reel-desc">${ev.descrizione}</div>` : ''}
        ${vibes ? `<div class="reel-vibes">${vibes}</div>` : ''}
      </div>
    </article>`;
}

function thumbHTML(ev, i) {
  const cat = (ev.categoria || 'CULTURA').toUpperCase();
  const imgUrl = ev.img ? U(ev.img, 240, 320) : '';
  return `
    <div class="thumb" data-idx="${i}">
      ${imgUrl ? `<img src="${imgUrl}" alt="" loading="lazy" onerror="this.remove()">` : ''}
      <span class="thumb-cat">${cat}</span>
      <span class="thumb-lbl">${ev.titolo || 'Evento'}</span>
    </div>`;
}

// ── Modal ──
function openModal(ev) {
  const cat = (ev.categoria || 'CULTURA').toUpperCase();
  const meta = [ev.data, ev.orario].filter(Boolean).join(' · ');
  const loc = [ev.luogo, ev.quartiere].filter(Boolean).join(' · ');
  const vibes = (ev.vibe || []).map(v => `<span class="vibe">#${v}</span>`).join('');
  const imgUrl = ev.img ? U(ev.img, 1100, 700) : '';
  const videoUrl = videoFor(ev);
  const source = sourceFor(ev);
  const mapsUrl = `https://www.google.com/maps/search/${encodeURIComponent((ev.luogo||'') + ' Firenze')}`;

  modalCard.innerHTML = `
    <div class="modal-cover ${videoUrl ? 'has-video' : ''}">
      ${videoUrl ? `<video src="${videoUrl}" poster="${imgUrl}" autoplay muted loop playsinline controls preload="metadata"></video>` : `${imgUrl ? `<img src="${imgUrl}" alt="" onerror="this.remove()">` : ''}`}
      <div class="modal-cover-play">
        <div class="pp" title="Anteprima video">${videoUrl ? 'LIVE' : '▶'}</div>
      </div>
      <button class="modal-close" id="modal-close" aria-label="Chiudi">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-cat-row">
        <span class="modal-cat ${cat}">${cat}</span>
        <span class="modal-meta">${meta}</span>
      </div>
      <h2 class="modal-title">${ev.titolo || 'Evento'}</h2>
      ${loc ? `<div class="modal-loc">${loc}</div>` : ''}
      ${ev.descrizione ? `<p class="modal-desc">${ev.descrizione}</p>` : ''}
      ${source ? `<a class="modal-source" href="${source.url}" target="_blank" rel="noopener">${source.platform} ${source.label}</a>` : ''}
      ${vibes ? `<div class="modal-vibes">${vibes}</div>` : ''}
      <div class="modal-actions">
        <button class="btn">Salva</button>
        ${source ? `<a class="btn" href="${source.url}" target="_blank" rel="noopener">Apri social</a>` : ''}
        <a class="btn btn-primary" href="${mapsUrl}" target="_blank" rel="noopener">Apri in Maps ↗</a>
      </div>
    </div>`;
  modal.classList.add('show');
  document.getElementById('modal-close').addEventListener('click', closeModal);
}

function closeModal() {
  modal.classList.remove('show');
}

modal.addEventListener('click', (e) => {
  if (e.target === modal) closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// ── Boot ──
render();
</script>
